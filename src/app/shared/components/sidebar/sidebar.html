<aside class="sidebar d-flex flex-column h-100">
   <div class="sidebar-header pb-3 mb-3">
    <span class="brand-mark d-inline-flex align-items-center justify-content-center fw-bold flex-shrink-0" aria-hidden="true">
      <i class="bi bi-calendar2-check"></i>
    </span>
    <div class="min-width-0">
      <h2 class="h6 mb-0 fw-bold text-nowrap">ELMS</h2>
      <span class="small opacity-75 text-nowrap">Leave Workspace</span>
    </div>
  </div>

  <nav class="nav nav-pills flex-column gap-2" aria-label="Main navigation">
    <a
      *ngFor="let nav of navLinks"
      [routerLink]="nav.route"
      routerLinkActive="active"
      class="nav-link fw-medium"
    >
      {{ nav.label }}
    </a>
  </nav>

  <!-- Logout Section Aligned Conventionally -->
 <div class="mt-auto p-3 border-top">
  <span class="small fw-medium d-block mb-2 text-sidebar-muted">Signed in as</span>
  <div class="d-flex justify-content-between align-items-center gap-3">
    <div class="h6 fw-bold mb-0 text-truncate">{{ user?.name || user?.email }}</div>
    <button class="btn btn-sm btn-sidebar flex-shrink-0" (click)="logout()">Logout</button>
  </div>
</div>
</aside>
