<div class="login-page">

    <div class="left-panel">
        <div class="brand-mark">
            <div class="brand-icon">
                <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 2L15 6V12L9 16L3 12V6L9 2Z" stroke="#fff" stroke-width="1.2" />
                    <circle cx="9" cy="9" r="2.2" fill="#fff" />
                </svg>
            </div>
            <div class="brand-text">
                <span class="brand-name">ELMS</span>
                <span class="brand-sub">Leave Management System</span>
            </div>
        </div>
        <div class="left-foot">&copy; 2026 ELMS</div>
    </div>

    <div class="right-panel">
        <div class="form-wrap">
            <h1 class="form-title">Sign in</h1>
            <p class="form-sub">Enter your credentials to continue.</p>

            <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>

                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" type="email" formControlName="email" placeholder="you@company.com"
                        autocomplete="email" [class.input-error]="submitted && f['email'].errors" />
                    <span class="error-msg" *ngIf="submitted && f['email'].errors?.['required']">
                        Email is required.
                    </span>
                    <span class="error-msg" *ngIf="submitted && f['email'].errors?.['email']">
                        Enter a valid email address.
                    </span>
                </div>

                <div class="field">
                    <div class="field-row">
                        <label for="password">Password</label>
                    </div>

                    <div class="input-group">
                        <input id="password"
                            [type]="passwordVisible ? 'text' : 'password'"
                            formControlName="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            [class.input-error]="submitted && f['password'].errors" />
                        <button
                            type="button"
                            class="password-toggle"
                            (click)="togglePassword()"
                            [attr.aria-label]="passwordVisible ? 'Hide password' : 'Show password'">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12Z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <a class="forgot-link" routerLink="/forgot-password">Forgot password?</a>
                    <span class="error-msg" *ngIf="submitted && f['password'].errors?.['required']">
                        Password is required.
                    </span>
                    <span class="error-msg" *ngIf="submitted && f['password'].errors?.['minlength']">
                        Password must be at least 8 characters.
                    </span>
                </div>

                <span class="server-error" *ngIf="serverError">{{ serverError }}</span>

                <button type="submit" class="submit-btn" [disabled]="loading">
                    <span>{{ loading ? 'Signing in...' : 'Sign in' }}</span>
                    <svg *ngIf="!loading" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="1.5"
                        stroke-linecap="round">
                        <path d="M2 7h10M8 3.5L11.5 7 8 10.5" />
                    </svg>
                </button>
                
                    <p class="register-link">
                        Don’t have an account?
                        <a routerLink="/register" style="text-decoration: none; color:  #1d9e75;">Create account</a>
                    </p>
                


            </form>

        </div>



    </div>



</div>
