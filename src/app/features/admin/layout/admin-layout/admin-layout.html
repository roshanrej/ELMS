<div class="admin-shell">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
          <rect x="1" y="1" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.9"/>
          <rect x="9.5" y="1" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.4"/>
          <rect x="1" y="9.5" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.4"/>
          <rect x="9.5" y="9.5" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">ELMS</span>
        <span class="brand-sub">Admin Console</span>
      </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>

      <a class="nav-item" routerLink="dashboard" routerLinkActive="active">
        <span class="nav-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <rect x="9.5" y="1" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <rect x="1" y="9.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </span>
        <span class="nav-item-label">Dashboard</span>
      </a>

      <span class="nav-section-label">Management</span>

      <a class="nav-item" routerLink="employees" routerLinkActive="active">
        <span class="nav-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="nav-item-label">Employees</span>
      </a>

      <a class="nav-item" routerLink="departments" routerLinkActive="active">
        <span class="nav-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="7" width="4" height="7" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <rect x="6" y="4" width="4" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <rect x="11" y="1" width="4" height="13" rx="1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </span>
        <span class="nav-item-label">Departments</span>
      </a>

      <a class="nav-item" routerLink="leave-quotas" routerLinkActive="active">
        <span class="nav-item-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 3V1.5M11 3V1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M2 7h12" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 10.5h3M5 13h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="nav-item-label">Leave Requests</span>
      </a>
    </nav>

    <!-- Footer / User -->
    <div class="sidebar-footer" *ngIf="user">
      <div class="sidebar-divider"></div>
      <div class="user-block">
        <div class="user-avatar">{{ user.email[0].toUpperCase() }}</div>
        <div class="user-info">
          <span class="user-email">{{ user.email }}</span>
          <span class="user-role">Administrator</span>
        </div>
        <button class="logout-btn" title="Logout" (click)="logout()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M5.5 2H3a1 1 0 00-1 1v9a1 1 0 001 1h2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10 10l3-2.5L10 5M13 7.5H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </aside>

  <!-- ── Main Content ──────────────────────────────────── -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
