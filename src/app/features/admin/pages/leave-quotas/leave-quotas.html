<section class="app-page">
  <app-page-header
    eyebrow="Leave Policies"
    title="Leave Policies"
    subtitle="Allocation rules per leave type for the current policy cycle."
  >
    <span class="badge badge-soft-red rounded-pill">{{ policyYear }} cycle</span>
  </app-page-header>

  <app-loading-spinner *ngIf="isLoading" />

  <ng-container *ngIf="!isLoading">
    <section class="app-card overflow-hidden" *ngIf="policies.length; else emptyPolicies">
      <div class="table-responsive">
        <table class="table app-table align-middle">
          <caption class="visually-hidden">Leave policies with allocation and status per leave type.</caption>
          <thead>
            <tr>
              <th scope="col">Leave Type</th>
              <th scope="col">Year</th>
              <th scope="col">Allocated Days</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let policy of policies">
              <td class="fw-bold">{{ formatType(policy.leaveTypeName) }}</td>
              <td>{{ policy.year }}</td>
              <td>{{ policy.allocatedLeave }} days</td>
              <td><app-leave-status-badge [status]="policy.status"></app-leave-status-badge></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
    <ng-template #emptyPolicies>
      <div class="app-card app-empty-state p-5 text-center">
        <i class="bi bi-sliders app-empty-state__icon" aria-hidden="true"></i>
        <p class="mb-0 mt-3">No leave policies configured for {{ policyYear }}.</p>
      </div>
    </ng-template>
  </ng-container>
</section>
