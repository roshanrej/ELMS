<section class="app-page">
  <app-page-header
    eyebrow="Admin Dashboard"
    title="Control leave operations from one place."
    subtitle="Set up users, teams, and leave policies before employees start requesting time off."
  ></app-page-header>

  <div class="row g-3">
    <div class="col-md-4" *ngFor="let card of summaryCards">
      <article class="app-card app-stat p-4">
        <span class="app-eyebrow">{{ card.label }}</span>
        <div class="app-stat__value my-3">{{ card.value }}</div>
        <p class="text-app-muted mb-0">{{ card.note }}</p>
      </article>
    </div>
  </div>

  <section class="app-card p-4 mt-3">
    <span class="app-eyebrow">Quick navigation</span>
    <h2 class="app-subtitle mb-3">Admin workspace</h2>

    <div class="row g-3">
      <div class="col-md-4" *ngFor="let link of quickLinks">
        <a [routerLink]="link.route" class="admin-quick-link app-card p-3 h-100 text-decoration-none">
          <i class="bi admin-quick-link__icon" [ngClass]="link.icon" aria-hidden="true"></i>
          <span class="admin-quick-link__label">{{ link.label }}</span>
        </a>
      </div>
    </div>
  </section>
</section>
