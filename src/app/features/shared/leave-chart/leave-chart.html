<section class="app-card p-4">
  <span class="app-eyebrow">Chart</span>
  <h3 class="app-subtitle">Leave distribution</h3>
  <div class="mb-3">
    <div class="d-flex justify-content-between mb-1">
      <span>Annual</span>
      <span class="fw-semibold">58%</span>
    </div>
    <div class="progress" role="progressbar" aria-label="Annual leave">
      <div class="progress-bar leave-chart__bar leave-chart__bar--annual"></div>
    </div>
  </div>
  <div>
    <div class="d-flex justify-content-between mb-1">
      <span>Sick</span>
      <span class="fw-semibold">22%</span>
    </div>
    <div class="progress" role="progressbar" aria-label="Sick leave">
      <div class="progress-bar leave-chart__bar leave-chart__bar--sick"></div>
    </div>
  </div>
</section>
