<section class="app-page">

  <app-page-header
    eyebrow="Leave Balance"
    title="Available time off for this year."
    subtitle="A live overview of your remaining leave across all categories."
  ></app-page-header>

  <!-- 🔥 Empty -->
  <section *ngIf="balances.length === 0" class="app-card p-4">
    <div class="app-empty-state">
      <i class="bi bi-pie-chart app-empty-state__icon" aria-hidden="true"></i>
      <p class="mb-0">Your leave balances are not available yet.</p>
      <p class="mb-0 small">Please check again after your profile is fully provisioned.</p>
    </div>
  </section>

  <!-- 🔥 Balance Cards -->
  <div *ngIf="balances.length > 0" class="row g-3">
    <div *ngFor="let balance of balanceViews" class="col-md-6 col-xl-3">
      <article
        class="app-card p-4 h-100"
        [ngClass]="balance.severityClass"
      >
        <span class="app-eyebrow">{{ balance.leaveTypeName }}</span>

        <div class="app-stat__value my-3">
          {{ formatValue(balance.remainingLeave) }}
        </div>

        <div
          class="progress mb-2"
          role="progressbar"
          [attr.aria-label]="balance.leaveTypeName + ' leave'"
          [attr.aria-valuenow]="balance.remainingPercent"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          <div
            class="progress-bar"
            [ngClass]="balance.progressClass"
            [style.width.%]="balance.remainingPercent"
          ></div>
        </div>

        <div class="d-flex justify-content-between small">
          <span class="text-muted">
            {{ balance.remainingLeave }} of {{ balance.allocatedLeave }} remaining
          </span>
          <span class="fw-semibold">
            {{ balance.remainingPercent }}%
          </span>
        </div>

      </article>
    </div>
  </div>

</section>
