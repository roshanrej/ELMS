<section class="app-page">
  <header class="app-page__hero">
    <span class="app-eyebrow">Leave Balance</span>
    <h2 class="display-6 fw-bold mb-3">Available time off</h2>
    <p class="text-app-muted mb-0">A simple balance overview using cards and Bootstrap progress bars.</p>
  </header>

  <div class="row g-3">
    <div class="col-md-6 col-xl-3">
      <article class="app-card p-4 h-100">
        <span class="app-eyebrow">Annual</span>
        <div class="app-stat__value my-3">14</div>
        <div class="progress" role="progressbar" aria-label="Annual leave">
          <div class="progress-bar" style="width: 58%;"></div>
        </div>
      </article>
    </div>
    <div class="col-md-6 col-xl-3">
      <article class="app-card p-4 h-100">
        <span class="app-eyebrow">Sick</span>
        <div class="app-stat__value my-3">09</div>
        <div class="progress" role="progressbar" aria-label="Sick leave">
          <div class="progress-bar" style="width: 75%;"></div>
        </div>
      </article>
    </div>
    <div class="col-md-6 col-xl-3">
      <article class="app-card p-4 h-100">
        <span class="app-eyebrow">Casual</span>
        <div class="app-stat__value my-3">06</div>
        <div class="progress" role="progressbar" aria-label="Casual leave">
          <div class="progress-bar" style="width: 75%;"></div>
        </div>
      </article>
    </div>
    <div class="col-md-6 col-xl-3">
      <article class="app-card p-4 h-100">
        <span class="app-eyebrow">WFH</span>
        <div class="app-stat__value my-3">11</div>
        <div class="progress" role="progressbar" aria-label="Work from home">
          <div class="progress-bar" style="width: 61%;"></div>
        </div>
      </article>
    </div>
  </div>
</section>
